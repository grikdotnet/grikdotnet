name = "grikdotnet-manifest-worker"
main = "worker/src/index.ts"
compatibility_date = "2026-03-04"

[observability]
enabled = true

[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "REPLACE_WITH_BUCKET_NAME"

[[queues.consumers]]
queue = "REPLACE_WITH_QUEUE_NAME"
max_batch_size = 10
max_batch_timeout = 5
