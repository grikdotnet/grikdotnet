<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1">
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1">
    <title>Article depot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            /* CLEAN LIGHT PALETTE */
            --bg-solid: #FCF8F1;          /* Warm light page background */
            --frosted-base: #F3EBDD;      /* Warm card tone, slightly darker than page */
            --text-primary: #1C1C1C;      /* Deep black for main titles */
            --text-secondary: #5F5F5F;    /* Dark gray for readability */
            --accent-gold: #B38E61;       /* Polished gold accent */
            --accent-gold-hover: #D1A56E;

            /* CLEAR GLASS PANEL (vs Frosted) */
            --glass-bg: rgba(255, 250, 242, 0.45); 
            --glass-border: rgba(179, 142, 97, 0.16); /* Warm subtle edge definition */
            
            /* PRECISION SHADOWS (For elevation) */
            --shadow-100: 0 8px 16px -8px rgba(0, 0, 0, 0.12), 0 2px 6px -2px rgba(0, 0, 0, 0.06);
            --shadow-300: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-600: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            
            /* Transition speeds */
            --t-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --t-base: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-secondary);
            min-height: 100vh;
            background-color: var(--bg-solid);
            display: flex;
            justify-content: center;
            letter-spacing: 0.02em;
            position: relative;
        }

        /* Subtle, structured texture background - optional, keeps it clean */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(179, 142, 97, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(179, 142, 97, 0.04) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: -1;
        }

        /* Clear Glass panel utility */
        .panel {
            background-color: var(--frosted-base);
            border: 1px solid var(--glass-border);
            border-radius: 12px; /* Precision corner */
            box-shadow: var(--shadow-100);
            transition: all var(--t-base);
        }

        .container {
            width: 100%;
            max-width: 1100px;
            padding: 80px 20px;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            color: var(--text-primary);
            margin-bottom: 15px;
            letter-spacing: -0.01em;
        }

        header h1::after {
            content: ".";
            color: var(--accent-gold);
        }

        header p {
            font-weight: 300;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Article Grid */
        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 360px));
            justify-content: center;
            gap: 25px;
            margin-bottom: 80px;
        }

        .article-card {
            padding: 30px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            min-height: 240px;
            position: relative;
            overflow: hidden;
            background-color: var(--frosted-base);
        }

        /* The 'Material' hover interaction: Shadow elevation + light reflection */
        .article-card:hover {
            box-shadow: var(--shadow-300);
            background-color: #F6EFE3; /* Keeps warm tone while elevating */
            border-color: rgba(179, 142, 97, 0.2);
        }

        .article-card::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(35deg, transparent 40%, rgba(255,255,255,0.6) 50%, transparent 60%);
            transform: rotate(25deg);
            transition: var(--t-base);
            opacity: 0;
            pointer-events: none;
        }

        .article-card:hover::after {
            opacity: 1;
            left: 100%;
            top: 100%;
        }

        .article-date {
            font-size: 0.8rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .article-title {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.3;
            color: var(--text-primary);
            margin-bottom: 15px;
            transition: color var(--t-fast);
        }

        .article-card:hover .article-title {
            color: var(--accent-gold-hover);
        }

        .article-excerpt {
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        .read-insight {
            font-size: 0.85rem;
            color: var(--text-primary);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.1em;
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .read-insight::after {
            content: "";
            width: 0;
            height: 1px;
            background-color: var(--accent-gold);
            position: absolute;
            bottom: -2px; left: 0;
            transition: var(--t-fast);
        }

        .article-card:hover .read-insight {
            color: var(--accent-gold);
        }

        .article-card:hover .read-insight::after {
            width: 100%;
        }

        /* Pagination - Cleaner */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .page-btn, .page-num {
            padding: 12px 20px;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--t-fast);
            background: #FFFFFF;
        }

        .page-btn:hover, .page-num:hover {
            color: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        .page-num.active {
            color: #FFFFFF;
            background-color: var(--accent-gold);
            border-color: var(--accent-gold);
            box-shadow: var(--shadow-100);
        }

        .page-btn:disabled, .page-num:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-ellipsis {
            padding: 12px 8px;
            color: var(--text-secondary);
            font-weight: 600;
            user-select: none;
        }

        .article-card.is-unavailable {
            cursor: not-allowed;
            opacity: 0.9;
        }

        /* Modal - Elevated clear glass */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(253, 253, 253, 0.9); /* Opaque white overlay */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all var(--t-base);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            width: 90%;
            max-width: 850px;
            max-height: 85vh;
            padding: 60px;
            overflow-y: auto;
            position: relative;
            background: #FFFFFF; /* Solid white for content focus */
            transform: translateY(30px);
            transition: transform var(--t-base);
            box-shadow: var(--shadow-600); /* Highest elevation shadow */
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 25px; right: 25px;
            background: var(--frosted-base);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            width: 44px; height: 44px;
            border-radius: 50%;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: all var(--t-fast);
        }

        .close-btn:hover {
            background-color: #FFFFFF;
            color: var(--accent-gold);
            box-shadow: var(--shadow-100);
        }

        .modal-body .article-modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--text-primary);
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .modal-body h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--text-primary);
            margin: 34px 0 16px;
            line-height: 1.25;
        }

        .modal-body h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.55rem;
            color: var(--text-primary);
            margin: 28px 0 14px;
            line-height: 1.3;
        }

        .modal-body h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 24px 0 12px;
            line-height: 1.35;
        }

        .modal-body .meta {
            color: var(--accent-gold);
            font-size: 0.78rem;
            margin-bottom: 36px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--glass-border);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        .modal-body p {
            line-height: 1.9;
            margin-bottom: 30px;
            font-size: 1.1rem;
            font-weight: 300;
        }

        .modal-body blockquote {
            margin: 0 0 30px;
            padding: 12px 18px;
            border-left: 4px solid var(--accent-gold);
            background: #F8F2E8;
            color: var(--text-primary);
            font-style: italic;
        }

        .modal-body blockquote p {
            margin-bottom: 0;
        }

        .modal-body ul,
        .modal-body ol {
            margin: 0 0 28px;
            padding-left: 1.25rem;
        }

        .modal-body li {
            line-height: 1.8;
            margin-bottom: 10px;
        }

        .modal-body img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 0 0 30px;
        }

        .modal-body ul + p,
        .modal-body ol + p,
        .modal-body ul + h1,
        .modal-body ul + h2,
        .modal-body ul + h3,
        .modal-body ol + h1,
        .modal-body ol + h2,
        .modal-body ol + h3 {
            margin-top: 12px;
        }

        /* Custom Scrollbar for Modal - Precision line */
        .modal-content::-webkit-scrollbar {
            width: 6px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: var(--frosted-base);
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: rgba(179, 142, 97, 0.2); 
            border-radius: 6px;
        }
        .modal-content::-webkit-scrollbar-thumb:hover {
            background: var(--accent-gold);
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.8rem; }
            .pagination {
                gap: 8px;
                flex-wrap: wrap;
                justify-content: center;
                padding: 0 8px;
            }
            .page-btn, .page-num {
                padding: 9px 12px;
                font-size: 0.92rem;
            }
            .page-ellipsis {
                padding: 9px 4px;
            }
            .modal-content {
                width: 100%;
                max-width: 100%;
                max-height: 100vh;
                height: 100vh;
                padding: 24px 18px 28px;
                border-radius: 0;
                border-left: 0;
                border-right: 0;
            }
            .modal-body .article-modal-title { font-size: 2.2rem; }
            .modal-body h1 { font-size: 1.65rem; }
            .modal-body h2 { font-size: 1.35rem; }
            .modal-body h3 { font-size: 1.1rem; }
            .container { padding: 60px 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>The repository of notes</h1>
            <p>Digital craft, business, and complexity of convenince.</p>
        </header>

        <main>
            <div class="article-grid" id="articleGrid">
                </div>

            <div class="pagination" id="pagination">
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="articleModal">
        <div class="panel modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            <div class="modal-body" id="modalBody">
                </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const MANIFEST_PATH = "./manifest.json";
        const PAGE_SIZE = 10;
        const MAX_VISIBLE_PAGE_LINKS = 7;

        const articleGrid = document.getElementById("articleGrid");
        const pagination = document.getElementById("pagination");
        const modal = document.getElementById("articleModal");
        const modalBody = document.getElementById("modalBody");
        const closeModal = document.getElementById("closeModal");

        let allEntries = [];
        let currentPage = 1;
        let totalPages = 1;
        let renderRequestId = 0;
        const articleCache = new Map();
        let localFolderHandle = null;
        let currentArticleKey = "";
        let isHydratingFromUrl = false;
        let pendingRouteArticleKey = "";
        let localWatcher = null;
        let localWatcherLoadPromise = null;
        let localRefreshTimer = null;
        let pendingLocalManifest = null;
        let pendingLocalFiles = null;
        const pendingChangedKeys = new Set();
        let localRefreshInFlight = false;

        const RE_MD_EXT        = /\.md$/i;
        const RE_SEPARATORS    = /[_-]+/g;
        const RE_NEWLINE       = /\r?\n/;
        const RE_ATX_HEADING   = /^#\s+/;
        const RE_CODE_BLOCK    = /```[\s\S]*?```/g;
        const RE_INLINE_CODE   = /`([^`]+)`/g;
        const RE_IMAGE         = /!\[[^\]]*]\([^)]*\)/g;
        const RE_LINK          = /\[([^\]]*)]\([^)]*\)/g;
        const RE_HEADING_PFX   = /^#{1,6}\s+/gm;
        const RE_MD_SYMBOLS    = /[*_~>#-]/g;
        const RE_WHITESPACE    = /\s+/g;
        const RE_LEADING_TITLE = /^#\s+.+(?:\r?\n)+/;

        if (window.marked) {
            marked.setOptions({ gfm: true, breaks: false });
        }

        function filenameToTitle(filename) {
            return filename
                .replace(RE_MD_EXT, "")
                .replace(RE_SEPARATORS, " ")
                .trim();
        }

        function extractPreview(markdown) {
            const lines = markdown.split(RE_NEWLINE);
            const heading = lines.find((line) => RE_ATX_HEADING.test(line));
            const title = heading ? heading.replace(RE_ATX_HEADING, "").trim() : "";

            const plain = markdown
                .replace(RE_CODE_BLOCK,   " ")
                .replace(RE_INLINE_CODE,  "$1")
                .replace(RE_IMAGE,        " ")
                .replace(RE_LINK,         "$1")
                .replace(RE_HEADING_PFX,  "")
                .replace(RE_MD_SYMBOLS,   " ")
                .replace(RE_WHITESPACE,   " ")
                .trim();

            return {
                title,
                excerpt: plain.slice(0, 180) + (plain.length > 180 ? "..." : "")
            };
        }

        function toHumanDate(isoDate) {
            const date = new Date(isoDate);
            if (Number.isNaN(date.getTime())) {
                return "Unknown date";
            }

            return date.toLocaleDateString(undefined, {
                year: "numeric",
                month: "short",
                day: "2-digit"
            });
        }

        function renderMarkdownToHtml(markdown) {
            if (!window.marked) {
                return `<p>${String(markdown)}</p>`;
            }

            return marked.parse(markdown);
        }

        function stripLeadingMarkdownTitle(markdown) {
            return markdown.replace(RE_LEADING_TITLE, "");
        }

        async function loadManifest() {
            if (localFolderHandle) {
                const text = await readTextFromFolder(localFolderHandle, "manifest.json");
                return JSON.parse(text);
            }
            const response = await fetch(MANIFEST_PATH, { cache: "no-store" });
            if (!response.ok) {
                throw new Error(`Failed to load manifest: ${response.status}`);
            }
            return response.json();
        }

        async function loadMarkdown(key) {
            if (localFolderHandle) {
                return readTextFromFolder(localFolderHandle, key);
            }
            const response = await fetch(`./${encodeURI(key)}`, { cache: "no-store" });
            if (!response.ok) {
                throw new Error(`Failed to load markdown ${key}: ${response.status}`);
            }
            return response.text();
        }

        function isLocalFilePage() {
            return window.location.protocol === "file:";
        }

        function hasFileSystemAccessApi() {
            return typeof window.showDirectoryPicker === "function";
        }

        function isLocalWatcherApiReady() {
            return Boolean(window.LocalFileLive && typeof window.LocalFileLive.createWatcher === "function");
        }

        async function ensureLocalWatcherScriptLoaded() {
            if (!isLocalFilePage()) {
                return null;
            }
            if (isLocalWatcherApiReady()) {
                return window.LocalFileLive;
            }
            if (localWatcherLoadPromise) {
                return localWatcherLoadPromise;
            }

            localWatcherLoadPromise = new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = "./local-file-live.js";
                script.async = true;
                script.onload = () => {
                    if (isLocalWatcherApiReady()) {
                        resolve(window.LocalFileLive);
                    } else {
                        reject(new Error("local-file-live.js loaded, but LocalFileLive API is missing."));
                    }
                };
                script.onerror = () => reject(new Error("Failed to load local-file-live.js"));
                document.head.appendChild(script);
            });

            return localWatcherLoadPromise;
        }

        function stopLocalWatcher() {
            if (!localWatcher) {
                return;
            }
            localWatcher.stop();
            localWatcher = null;
        }

        function scheduleLocalRefresh(event = null) {
            if (event && typeof event === "object") {
                if (Array.isArray(event.files)) {
                    pendingLocalFiles = event.files;
                }

                if (event.type === "list" && event.manifest && Array.isArray(event.manifest.files)) {
                    pendingLocalManifest = event.manifest;
                }

                if (event.type === "content" && Array.isArray(event.changedKeys)) {
                    for (const key of event.changedKeys) {
                        if (typeof key === "string" && key.trim() !== "") {
                            pendingChangedKeys.add(key);
                        }
                    }
                }
            }

            if (localRefreshTimer) {
                return;
            }
            localRefreshTimer = setTimeout(async () => {
                localRefreshTimer = null;
                await refreshAfterLocalChange();
            }, 80);
        }

        async function refreshAfterLocalChange() {
            if (localRefreshInFlight) {
                return;
            }
            localRefreshInFlight = true;
            try {
                const modalWasOpen = modal.classList.contains("active") && Boolean(currentArticleKey);
                const modalArticleKey = currentArticleKey;
                const modalContent = modal.querySelector(".modal-content");
                const previousModalScrollTop = modalContent ? modalContent.scrollTop : 0;
                const previousPage = currentPage;
                const manifestSnapshot = pendingLocalManifest;
                const listChanged = Boolean(manifestSnapshot);
                const changedKeys = Array.from(pendingChangedKeys);
                const filesSnapshot = Array.isArray(pendingLocalFiles) ? pendingLocalFiles : null;

                pendingLocalManifest = null;
                pendingLocalFiles = null;
                pendingChangedKeys.clear();

                if (listChanged) {
                    articleCache.clear();
                    allEntries = manifestSnapshot && Array.isArray(manifestSnapshot.files)
                        ? manifestSnapshot.files
                        : [];
                } else {
                    for (const key of changedKeys) {
                        articleCache.delete(key);
                    }
                    if (filesSnapshot) {
                        allEntries = filesSnapshot;
                    }
                }

                totalPages = Math.max(1, Math.ceil(allEntries.length / PAGE_SIZE));

                if (allEntries.length === 0) {
                    close({ syncUrl: false });
                    renderError("No markdown files were found in manifest.json.");
                    renderPagination();
                    writeUrlState({ page: 1, article: "" }, "replace");
                    return;
                }

                let nextPage = Math.min(Math.max(1, previousPage), totalPages);
                if (modalWasOpen && modalArticleKey) {
                    const modalArticleIndex = findArticleIndexByKey(modalArticleKey);
                    if (modalArticleIndex >= 0) {
                        nextPage = pageForArticleIndex(modalArticleIndex);
                    }
                }

                pendingRouteArticleKey = "";
                const currentPageKeys = new Set(getEntriesForPage(nextPage).map((entry) => entry.key));
                const shouldRenderPage =
                    listChanged ||
                    changedKeys.some((key) => currentPageKeys.has(key)) ||
                    (filesSnapshot && nextPage !== previousPage);

                if (shouldRenderPage) {
                    await renderPage(nextPage, { scroll: false, syncUrl: false, showLoading: listChanged });
                } else {
                    currentPage = nextPage;
                    renderPagination();
                }

                if (modalWasOpen && modalArticleKey) {
                    const shouldRefreshModal = listChanged || changedKeys.includes(modalArticleKey);
                    if (shouldRefreshModal) {
                        const modalArticleEntry = allEntries.find((entry) => entry.key === modalArticleKey);
                        if (modalArticleEntry) {
                            const refreshedArticle = await loadArticle(modalArticleEntry);
                            if (!refreshedArticle.failed) {
                                openModal(refreshedArticle, { syncUrl: false });
                                const refreshedModalContent = modal.querySelector(".modal-content");
                                if (refreshedModalContent) {
                                    refreshedModalContent.scrollTop = previousModalScrollTop;
                                }
                            } else {
                                close({ syncUrl: false });
                                renderRouteNotice(`Article became unavailable: ${articleTokenFromKey(modalArticleKey)}`);
                            }
                        } else {
                            close({ syncUrl: false });
                            renderRouteNotice(`Article no longer exists: ${articleTokenFromKey(modalArticleKey)}`);
                        }
                    }
                }

                writeUrlState(
                    {
                        page: currentPage,
                        article: modal.classList.contains("active") ? currentArticleKey : ""
                    },
                    "replace"
                );
            } catch (error) {
                console.warn("Failed to refresh live local changes:", error);
            } finally {
                localRefreshInFlight = false;
                if (pendingLocalManifest || pendingLocalFiles || pendingChangedKeys.size > 0) {
                    scheduleLocalRefresh();
                }
            }
        }

        async function readTextFromFolder(rootHandle, relativePath) {
            const cleanPath = String(relativePath).replaceAll("\\", "/").replace(/^\.?\//, "");
            const parts = cleanPath.split("/").filter(Boolean);
            if (parts.length === 0) {
                throw new Error("Invalid file path.");
            }

            let dirHandle = rootHandle;
            for (let i = 0; i < parts.length - 1; i += 1) {
                dirHandle = await dirHandle.getDirectoryHandle(parts[i]);
            }

            const fileHandle = await dirHandle.getFileHandle(parts[parts.length - 1]);
            const file = await fileHandle.getFile();
            return file.text();
        }

        async function openLocalFolderAndReload() {
            if (!hasFileSystemAccessApi()) {
                throw new Error("File System Access API is not available in this browser.");
            }

            stopLocalWatcher();
            localFolderHandle = await window.showDirectoryPicker();
            const liveApi = await ensureLocalWatcherScriptLoaded();
            if (liveApi) {
                localWatcher = liveApi.createWatcher({
                    dirHandle: localFolderHandle,
                    pollIntervalMs: 400,
                    onListChanged: (event) => scheduleLocalRefresh(event),
                    onContentChanged: (event) => scheduleLocalRefresh(event),
                    onError: (error) => {
                        console.warn("Local watcher error:", error);
                    }
                });

                await localWatcher.rebuildNow();
                localWatcher.start();
            }
            articleCache.clear();
            await bootstrap();
        }

        function buildWrongFolderMessage(reason) {
            const base = "Probably you selected a wrong folder. Please select the folder with your site.";
            if (!reason) {
                return base;
            }
            return `${base}<br><small>${reason}</small>`;
        }

        function renderLocalFolderPrompt(errorMessage) {
            articleGrid.innerHTML = "";
            const card = document.createElement("article");
            card.className = "panel article-card";
            card.innerHTML = `
                <div>
                    <div class="article-date">Local file mode</div>
                    <h3 class="article-title">Open site folder</h3>
                    <p class="article-excerpt">${errorMessage}</p>
                    <button id="openLocalFolderBtn" class="panel page-btn" type="button">Open Folder</button>
                </div>
            `;
            articleGrid.appendChild(card);
            pagination.innerHTML = "";
            pagination.style.display = "none";

            const button = document.getElementById("openLocalFolderBtn");
            if (!button) {
                return;
            }
            button.addEventListener("click", async () => {
                try {
                    await openLocalFolderAndReload();
                } catch (error) {
                    const message = error instanceof Error ? error.message : "Failed to open folder.";
                    renderLocalFolderPrompt(buildWrongFolderMessage(message));
                }
            });
        }

        function renderError(message) {
            articleGrid.innerHTML = "";
            const errorCard = document.createElement("article");
            errorCard.className = "panel article-card";
            errorCard.innerHTML = `
                <div>
                    <div class="article-date">Error</div>
                    <h3 class="article-title">Use a different browser</h3>
                    <p class="article-excerpt">${message}</p>
                </div>
            `;
            articleGrid.appendChild(errorCard);
        }

        function renderRouteNotice(message) {
            const notice = document.createElement("article");
            notice.className = "panel article-card is-unavailable";
            notice.innerHTML = `
                <div>
                    <div class="article-date">Notice</div>
                    <h3 class="article-title">Article route</h3>
                    <p class="article-excerpt">${message}</p>
                </div>
            `;
            articleGrid.prepend(notice);
        }

        function buildFallbackArticle(entry, errorMessage) {
            const baseTitle = filenameToTitle(entry.key);
            return {
                key: entry.key,
                date: toHumanDate(entry.lastModified),
                title: baseTitle,
                excerpt: `Could not load this markdown file (${errorMessage}).`,
                markdown: `# ${baseTitle}\n\nCould not load this markdown file.\n\n${errorMessage}`,
                failed: true
            };
        }

        async function loadArticle(entry) {
            if (articleCache.has(entry.key)) {
                return articleCache.get(entry.key);
            }

            let article;
            try {
                const markdown = await loadMarkdown(entry.key);
                const preview = extractPreview(markdown);
                article = {
                    key: entry.key,
                    date: toHumanDate(entry.lastModified),
                    title: preview.title || filenameToTitle(entry.key),
                    excerpt: preview.excerpt || "No preview available.",
                    markdown,
                    failed: false
                };
            } catch (error) {
                const message = error instanceof Error ? error.message : "Unknown error";
                article = buildFallbackArticle(entry, message);
            }

            articleCache.set(entry.key, article);
            return article;
        }

        function getEntriesForPage(page) {
            const safePage = Math.max(1, Math.min(page, totalPages));
            const start = (safePage - 1) * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            return allEntries.slice(start, end);
        }

        async function loadArticlesForPage(page) {
            const entries = getEntriesForPage(page);
            return Promise.all(entries.map((entry) => loadArticle(entry)));
        }

        function openModal(article, options = {}) {
            const bodyWithoutTopTitle = stripLeadingMarkdownTitle(article.markdown);
            modalBody.innerHTML = `
                <h1 class="article-modal-title">${article.title}</h1>
                <div class="meta">PUBLISHED ${article.date.toUpperCase()}</div>
                ${renderMarkdownToHtml(bodyWithoutTopTitle)}
            `;
            modal.classList.add("active");
            document.body.style.overflow = "hidden";
            currentArticleKey = article.key;

            if (options.syncUrl !== false && !isHydratingFromUrl) {
                writeUrlState(
                    { page: currentPage, article: currentArticleKey },
                    options.historyMode || "push"
                );
            }
        }

        function close(options = {}) {
            modal.classList.remove("active");
            document.body.style.overflow = "auto";
            currentArticleKey = "";

            const syncUrl = options.syncUrl !== false;
            const historyMode = options.historyMode || "push";
            if (syncUrl && !isHydratingFromUrl) {
                writeUrlState({ page: currentPage, article: "" }, historyMode);
            }
        }

        function renderCards(articles) {
            const fragment = document.createDocumentFragment();

            for (const article of articles) {
                const card = document.createElement("article");
                card.className = `panel article-card${article.failed ? " is-unavailable" : ""}`;
                card.innerHTML = `
                    <div>
                        <div class="article-date">${article.date}</div>
                        <h3 class="article-title">${article.title}</h3>
                        <p class="article-excerpt">${article.excerpt}</p>
                    </div>
                    <div><span class="read-insight">${article.failed ? "UNAVAILABLE" : "READ INSIGHT →"}</span></div>
                `;

                if (!article.failed) {
                    card.addEventListener("click", () => openModal(article, { syncUrl: true, historyMode: "push" }));
                }

                fragment.appendChild(card);
            }

            articleGrid.replaceChildren(fragment);
        }

        function buildButton(label, className, role, disabled, page) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = `panel ${className}`;
            btn.textContent = label;
            btn.dataset.role = role;
            if (typeof page === "number") {
                btn.dataset.page = String(page);
            }
            btn.disabled = disabled;
            return btn;
        }

        function getVisiblePageTokens(activePage, pageCount) {
            if (pageCount <= MAX_VISIBLE_PAGE_LINKS) {
                const tokens = [];
                for (let i = 1; i <= pageCount; i++) tokens.push(i);
                return tokens;
            }

            const maxLinks = Math.max(7, MAX_VISIBLE_PAGE_LINKS);
            const edgeSpan = maxLinks - 3;

            // Near the start: 1 2 3 4 5 ... N
            if (activePage <= edgeSpan) {
                const tokens = [1];
                for (let page = 2; page <= maxLinks - 2; page += 1) {
                    tokens.push(page);
                }
                tokens.push("...");
                tokens.push(pageCount);
                return tokens;
            }

            // Near the end: 1 ... N-4 N-3 N-2 N-1 N
            if (activePage >= pageCount - edgeSpan + 1) {
                const tokens = [1, "..."];
                const start = pageCount - (maxLinks - 3);
                for (let page = start; page <= pageCount - 1; page += 1) {
                    tokens.push(page);
                }
                tokens.push(pageCount);
                return tokens;
            }

            // Middle: 1 ... P-1 P P+1 ... N
            const middleWindow = maxLinks - 4;
            const start = activePage - Math.floor(middleWindow / 2);
            const end = start + middleWindow - 1;
            const tokens = [1, "..."];
            for (let page = start; page <= end; page += 1) {
                tokens.push(page);
            }
            tokens.push("...");
            tokens.push(pageCount);
            return tokens;
        }

        function renderPagination() {
            if (allEntries.length === 0) {
                pagination.innerHTML = "";
                pagination.style.display = "none";
                return;
            }

            pagination.style.display = "flex";
            pagination.innerHTML = "";

            pagination.appendChild(buildButton("PREV", "page-btn", "prev", currentPage === 1));

            const tokens = getVisiblePageTokens(currentPage, totalPages);
            for (const token of tokens) {
                if (token === "...") {
                    const ellipsis = document.createElement("span");
                    ellipsis.className = "page-ellipsis";
                    ellipsis.textContent = "...";
                    pagination.appendChild(ellipsis);
                    continue;
                }

                const pageBtn = buildButton(String(token), "page-num", "page", false, token);
                if (token === currentPage) {
                    pageBtn.classList.add("active");
                }
                pagination.appendChild(pageBtn);
            }

            pagination.appendChild(buildButton("NEXT", "page-btn", "next", currentPage === totalPages));
        }

        function getPageFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const raw = Number(params.get("page"));
            if (!Number.isInteger(raw) || raw < 1) {
                return 1;
            }
            return raw;
        }

        function articleTokenFromKey(key) {
            return String(key)
                .replace(RE_MD_EXT, "")
                .replace(/[\s_]+/g, "-")
                .replace(/-+/g, "-")
                .trim();
        }

        function getArticleTokenFromUrl() {
            const rawSearch = window.location.search.replace(/^\?/, "");
            if (!rawSearch) {
                return "";
            }

            const parts = rawSearch.split("&").filter(Boolean);
            for (const part of parts) {
                const [rawKey, rawValue = ""] = part.split("=");
                const key = decodeURIComponent(rawKey || "").trim();
                const value = decodeURIComponent(rawValue || "").trim();

                // Backward compatibility for old links: ?article=Token
                if (key === "article" && value) {
                    return value;
                }

                // New format: ?Token (bare query key)
                if (key && key !== "page" && rawValue === "") {
                    return key;
                }
            }

            return "";
        }

        function resolveArticleKeyFromToken(token) {
            if (!token) {
                return "";
            }
            const normalized = token.toLowerCase();
            const match = allEntries.find((entry) => articleTokenFromKey(entry.key).toLowerCase() === normalized);
            return match ? match.key : "";
        }

        function writeUrlState({ page, article }, mode = "push") {
            const url = new URL(window.location.href);
            const searchParts = [];

            if (article && article.trim() !== "") {
                const token = articleTokenFromKey(article);
                if (token) {
                    searchParts.push(encodeURIComponent(token));
                }
            }

            if (page > 1) {
                searchParts.push(`page=${encodeURIComponent(String(page))}`);
            }

            url.search = searchParts.length > 0 ? `?${searchParts.join("&")}` : "";

            if (mode === "replace") {
                window.history.replaceState({ page, article: article || "" }, "", url);
            } else {
                window.history.pushState({ page, article: article || "" }, "", url);
            }
        }

        function findArticleIndexByKey(key) {
            if (!key) {
                return -1;
            }
            return allEntries.findIndex((entry) => entry.key === key);
        }

        function pageForArticleIndex(index) {
            if (index < 0) {
                return 1;
            }
            return Math.floor(index / PAGE_SIZE) + 1;
        }

        function renderLoadingState() {
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < PAGE_SIZE; i++) {
                const ph = document.createElement("article");
                ph.className = "panel article-card";
                ph.setAttribute("aria-hidden", "true");
                ph.innerHTML = `
                    <div>
                        <div class="article-date" style="color:transparent;background:var(--frosted-base);border-radius:4px;width:6em;">&nbsp;</div>
                        <h3 class="article-title" style="color:transparent;background:var(--frosted-base);border-radius:4px;">&nbsp;</h3>
                        <p class="article-excerpt" style="color:transparent;background:var(--frosted-base);border-radius:4px;">&nbsp;</p>
                    </div>
                `;
                fragment.appendChild(ph);
            }
            articleGrid.replaceChildren(fragment);
        }

        async function renderPage(page, options = {}) {
            const nextPage = Math.max(1, Math.min(page, totalPages));
            const shouldScroll = options.scroll === true;
            const syncUrl = options.syncUrl !== false;
            const historyMode = options.historyMode || "push";
            const showLoading = options.showLoading !== false;
            const requestId = ++renderRequestId;
            currentPage = nextPage;

            if (showLoading) {
                renderLoadingState();
            }
            const articles = await loadArticlesForPage(currentPage);
            if (requestId !== renderRequestId) {
                return;
            }
            renderCards(articles);
            renderPagination();

            if (syncUrl) {
                writeUrlState(
                    { page: currentPage, article: currentArticleKey },
                    historyMode
                );
            }

            if (pendingRouteArticleKey) {
                const match = articles.find((article) => article.key === pendingRouteArticleKey && !article.failed);
                if (match) {
                    const mode = isHydratingFromUrl ? "replace" : "push";
                    openModal(match, { syncUrl: true, historyMode: mode });
                    pendingRouteArticleKey = "";
                }
            }

            if (shouldScroll) {
                articleGrid.scrollIntoView({ behavior: "smooth", block: "start" });
            }
        }

        async function bootstrap() {
            if (isLocalFilePage() && !hasFileSystemAccessApi()) {
                renderError("You opened your page from a folder. Please use <b>Chrome</b> or <b>Edge</b>. <br>This browser does not allow to work with local folders.");
                pagination.innerHTML = "";
                pagination.style.display = "none";
                return;
            }

            try {
                const manifest = await loadManifest();
                allEntries = Array.isArray(manifest.files) ? manifest.files : [];
                totalPages = Math.max(1, Math.ceil(allEntries.length / PAGE_SIZE));
                currentPage = 1;

                if (allEntries.length === 0) {
                    renderError("No markdown files were found in manifest.json.");
                    renderPagination();
                    return;
                }

                const requestedPage = getPageFromUrl();
                const requestedArticleToken = getArticleTokenFromUrl();
                const requestedArticleKey = resolveArticleKeyFromToken(requestedArticleToken);
                const clampedRequestedPage = Math.min(Math.max(1, requestedPage), totalPages);

                let routePage = clampedRequestedPage;
                let routeArticle = requestedArticleKey;

                if (requestedArticleToken) {
                    const articleIndex = findArticleIndexByKey(requestedArticleKey);
                    if (articleIndex >= 0) {
                        routePage = pageForArticleIndex(articleIndex);
                        pendingRouteArticleKey = requestedArticleKey;
                    } else {
                        routeArticle = "";
                    }
                }

                isHydratingFromUrl = true;
                await renderPage(routePage, { scroll: false, syncUrl: false });

                if (requestedArticleToken && !routeArticle) {
                    renderRouteNotice(`Article not found in manifest: ${requestedArticleToken}`);
                }

                writeUrlState({ page: routePage, article: routeArticle }, "replace");
                isHydratingFromUrl = false;
            } catch (error) {
                const message = error instanceof Error ? error.message : "Unknown error";
                if (isLocalFilePage()) {
                    if (localFolderHandle) {
                        renderLocalFolderPrompt(buildWrongFolderMessage(message));
                    } else {
                        renderLocalFolderPrompt('Navigate to the folder with your site, and press "Select folder".');
                    }
                    return;
                }
                renderError(message);
                pagination.innerHTML = "";
                pagination.style.display = "none";
            }
        }

        pagination.addEventListener("click", async (event) => {
            const button = event.target.closest("button[data-role]");
            if (!button || button.disabled) {
                return;
            }

            const role = button.dataset.role;
            if (role === "prev") {
                await renderPage(currentPage - 1, { scroll: true, syncUrl: true, historyMode: "push" });
                return;
            }

            if (role === "next") {
                await renderPage(currentPage + 1, { scroll: true, syncUrl: true, historyMode: "push" });
                return;
            }

            if (role === "page") {
                const page = Number(button.dataset.page);
                if (!Number.isNaN(page)) {
                    await renderPage(page, { scroll: true, syncUrl: true, historyMode: "push" });
                }
            }
        });

        window.addEventListener("popstate", async () => {
            if (allEntries.length === 0) {
                return;
            }

            const pageFromUrl = Math.min(Math.max(1, getPageFromUrl()), totalPages);
            const articleTokenFromUrl = getArticleTokenFromUrl();
            const articleKeyFromUrl = resolveArticleKeyFromToken(articleTokenFromUrl);
            const articleIndex = findArticleIndexByKey(articleKeyFromUrl);
            const routePage = articleIndex >= 0 ? pageForArticleIndex(articleIndex) : pageFromUrl;

            isHydratingFromUrl = true;
            pendingRouteArticleKey = articleIndex >= 0 ? articleKeyFromUrl : "";
            await renderPage(routePage, { scroll: false, syncUrl: false });

            if (!articleTokenFromUrl) {
                close({ syncUrl: false });
            } else if (articleIndex < 0) {
                close({ syncUrl: false });
                renderRouteNotice(`Article not found in manifest: ${articleTokenFromUrl}`);
            }
            isHydratingFromUrl = false;
        });

        closeModal.addEventListener("click", close);
        modal.addEventListener("click", (e) => { if (e.target === modal) close(); });
        document.addEventListener("keydown", (e) => { if (e.key === "Escape" && modal.classList.contains("active")) close(); });

        bootstrap();
    </script>
</body>
</html>
